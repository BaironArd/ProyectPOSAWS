# ============================================================
# Perfil dev — H2 en memoria
# ============================================================
spring.datasource.url=jdbc:h2:mem:posdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
server.port=8080

# ============================================================
# JWT
# ============================================================
jwt.secret=clave-secreta-minimo-256-bits-cambiar-en-produccion-pos-2025
jwt.expiration=28800

# ============================================================
# Inicialización de datos — solo productos (usuarios via DataInitializer)
# ============================================================
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
# Deshabilitar el script de usuarios — se crean via DataInitializer con BCrypt correcto
spring.sql.init.data-locations=classpath:data.sql
