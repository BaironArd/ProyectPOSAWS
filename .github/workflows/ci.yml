name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Run tests
      run: cd PROYECTPOS/backend/pos-backend && mvn clean verify

    - name: Generate test report
      uses: dorny/test-reporter@v1
      if: success() || failure()
      with:
        name: Backend Tests
        path: 'PROYECTPOS/backend/pos-backend/target/surefire-reports/*.xml'
        reporter: java-junit

    - name: Build JAR
      run: cd PROYECTPOS/backend/pos-backend && mvn clean package -DskipTests

    - name: Upload JAR artifact
      uses: actions/upload-artifact@v3
      with:
        name: pos-backend-jar
        path: PROYECTPOS/backend/pos-backend/target/*.jar

  frontend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: PROYECTPOS/frontend/pos-frontend/package-lock.json

    - name: Install dependencies
      run: cd PROYECTPOS/frontend/pos-frontend && npm ci

    - name: Run linting
      run: cd PROYECTPOS/frontend/pos-frontend && npm run lint

    - name: Run tests
      run: cd PROYECTPOS/frontend/pos-frontend && npm run test:ci

    - name: Build application
      run: cd PROYECTPOS/frontend/pos-frontend && npm run build

    - name: Upload build artifact
      uses: actions/upload-artifact@v3
      with:
        name: pos-frontend-build
        path: PROYECTPOS/frontend/pos-frontend/dist/

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download backend JAR
      uses: actions/download-artifact@v3
      with:
        name: pos-backend-jar
        path: PROYECTPOS/backend/pos-backend/target/

    - name: Download frontend build
      uses: actions/download-artifact@v3
      with:
        name: pos-frontend-build
        path: PROYECTPOS/frontend/pos-frontend/dist/

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build backend Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./PROYECTPOS/backend/pos-backend
        file: ./PROYECTPOS/backend/pos-backend/Dockerfile
        tags: pos-backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build frontend Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./PROYECTPOS/frontend/pos-frontend
        file: ./PROYECTPOS/frontend/pos-frontend/Dockerfile
        tags: pos-frontend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  security:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'