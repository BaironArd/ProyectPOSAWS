version: '3.8'

services:
  # Base de datos PostgreSQL (opcional para desarrollo)
  postgres:
    image: postgres:15-alpine
    container_name: pos-postgres
    environment:
      POSTGRES_DB: posdb
      POSTGRES_USER: ${DB_USER:-pos_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Script de inicialización (si se necesita en el futuro)
      # - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - pos-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pos_user} -d posdb"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend Spring Boot
  backend:
    build:
      context: ./PROYECTPOS/backend/pos-backend
      dockerfile: Dockerfile
    container_name: pos-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/posdb
      DB_USER: ${DB_USER:-pos_user}
      DB_PASSWORD: ${DB_PASSWORD:-secure_password}
      JWT_SECRET: ${JWT_SECRET:-clave-secreta-minimo-256-bits-cambiar-en-produccion-pos-2025}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-28800}
      CORS_ALLOWED_ORIGINS: http://localhost:80
      LOG_LEVEL_APP: DEBUG
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pos-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Frontend React
  frontend:
    build:
      context: ./PROYECTPOS/frontend/pos-frontend
      dockerfile: Dockerfile
    container_name: pos-frontend
    environment:
      NODE_ENV: production
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - pos-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:

networks:
  pos-network:
    driver: bridge