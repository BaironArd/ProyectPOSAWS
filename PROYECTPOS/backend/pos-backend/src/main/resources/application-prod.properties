# ============================================================
# Perfil prod — PostgreSQL
# ============================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/posdb}
spring.datasource.username=${DB_USER:pos_user}
spring.datasource.password=${DB_PASSWORD:secure_password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Mantener BD estática - NO usar ddl-auto en producción
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Connection pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ============================================================
# Servidor
# ============================================================
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api/v1

# HTTPS (deshabilitado por defecto - configurar en producción)
server.ssl.enabled=false
# server.ssl.key-store=classpath:keystore.p12
# server.ssl.key-store-password=${SSL_PASSWORD}
# server.ssl.keyStoreType=PKCS12
# server.ssl.keyAlias=tomcat

# ============================================================
# JWT
# ============================================================
jwt.secret=${JWT_SECRET:clave-secreta-minimo-256-bits-cambiar-en-produccion-pos-2025}
jwt.expiration=${JWT_EXPIRATION:28800}

# ============================================================
# Seguridad
# ============================================================
# CORS - whitelist en producción
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ============================================================
# Logging
# ============================================================
logging.level.root=${LOG_LEVEL_ROOT:WARN}
logging.level.com.pos=${LOG_LEVEL_APP:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:WARN}
logging.level.org.hibernate.SQL=${LOG_LEVEL_SQL:ERROR}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${LOG_LEVEL_SQL_PARAMS:ERROR}

# Log format
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# File logging (deshabilitado por defecto)
# logging.file.name=/var/log/pos/application.log
# logging.logback.rollingpolicy.max-file-size=100MB
# logging.logback.rollingpolicy.max-history=30

# ============================================================
# Inicialización de datos — mantener BD estática
# ============================================================
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.sql.init.data-locations=classpath:data.sql

# ============================================================
# Actuator (monitoreo)
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.metrics.enabled=true
management.metrics.export.prometheus.enabled=true

# ============================================================
# Info del proyecto
# ============================================================
info.app.name=POS Backend
info.app.version=1.0.0
info.app.java.version=21